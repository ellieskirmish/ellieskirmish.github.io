<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellie Skirmish | Portfolio</title>
    <style>
}           
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; 
            margin: 0;
            background-color: #0d1117; /* GitHub Dark Theme Color */
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        .container { max-width: 800px; }
        h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .project-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            margin-top: 20px;
        }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style> <span class="floating-heart">💖</span>
</head>
<body>
    <div id="pet-game" style="text-align: center; background: #1c2128; border: 2px solid #ff69b4; border-radius: 20px; padding: 30px; margin-top: 30px; max-width: 400px; margin-left: auto; margin-right: auto;">
    <h2 style="color: #ff69b4; margin-top: 0;">Pet the Dino! 🦖</h2>
    
    <div id="dino" style="font-size: 80px; cursor: pointer; transition: transform 0.2s ease; display: inline-block; user-select: none;">
        🦖
    </div>

    <p style="font-size: 1.2rem; color: #c9d1d9;">Total Pets: <span id="pet-count" style="font-weight: bold; color: #58a6ff;">0</span></p>
    <p id="status-message" style="font-style: italic; color: #8b949e; height: 20px;">He's waiting for pets...</p>
</div>

<script>
    let pets = 0;
    const dino = document.getElementById('dino');
    const petCount = document.getElementById('pet-count');
    const statusMessage = document.getElementById('status-message');

    const messages = [
        "So happy! ✨",
        "Rawr! (That means thank you) 💖",
        "Best friends forever! 🌈",
        "Keep going! 🦖",
        "He loves you! 🌸"
    ];

    dino.addEventListener('mousedown', () => {
        // Increase score
        pets++;
        petCount.innerText = pets;
        
        // Make the dino "squish" when clicked
        dino.style.transform = 'scale(1.3) rotate(10deg)';
        
        // Random cute message
        const randomMsg = messages[Math.floor(Math.random() * messages.length)];
        statusMessage.innerText = randomMsg;
    });

    dino.addEventListener('mouseup', () => {
        // Go back to normal size
        dino.style.transform = 'scale(1) rotate(0deg)';
    });

    // Hover effect
    dino.addEventListener('mouseover', () => {
        if (pets === 0) statusMessage.innerText = "He looks friendly! Click him!";
        dino.style.transform = 'scale(1.1)';
    });

    dino.addEventListener('mouseout', () => {
        dino.style.transform = 'scale(1)';
    });
</script>
    <div class="container">
        <h1>Hi, I'm Ellie 👋</h1>
        <p>Welcome to my personal site hosted on GitHub Pages!</p>
        
        <div class="project-card">
            <h3>🚀 My Current Project</h3>
            <p>I am currently learning how to deploy websites and manage repositories.</p>
            <a href="https://github.com/ellieskirmish">View my GitHub Profile</a>
        </div>
    </div>
</body>
</html>
